<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Guardia · Visitantes</title>
  <link rel="manifest" href="manifest.json" />

  <!-- html5-qrcode (CDN) -->
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

  <!-- QRCode.js (para generar QR en citas programadas / ver QR) -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

  <style>
    /* Reset */
    *, *::before, *::after { box-sizing: border-box; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:#f6f8fc;
      color:#0f172a;
    }
    header{
      background:#fff;
      border-bottom:1px solid #e5e7eb;
      position:sticky; top:0; z-index:10;
    }
    .container{ max-width:1100px; margin:0 auto; padding:16px; }
    .row{ display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
    .spacer{ flex:1; }
    .card{
      background:#fff;
      border:1px solid rgba(15,23,42,.10);
      border-radius:14px;
      padding:16px;
      box-shadow:0 10px 24px rgba(0,0,0,.08);
    }
    .two{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .three{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
    .five{ display:grid; grid-template-columns:repeat(5, 1fr); gap:12px; }
    @media (max-width:980px){
      .five{ grid-template-columns:1fr; }
      .three{ grid-template-columns:1fr; }
      .two{ grid-template-columns:1fr; }
    }
    label{ font-size:13px; color:#475569; display:block; margin:10px 0 6px; }
    input, select{
      width:100%;
      max-width:100%;
      display:block;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid #cbd5f5;
      font-size:15px;
      background:#fff;
    }
    button{
      background:#2563eb;
      color:#fff;
      border:none;
      padding:10px 12px;
      border-radius:12px;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
    }
    button.secondary{ background:#e5e7eb; color:#0f172a; }
    button.ok{ background:#16a34a; }
    button.danger{ background:#dc2626; }
    button:disabled{ opacity:.6; cursor:not-allowed; }

    .pill{
      display:inline-flex; align-items:center; gap:8px;
      padding:6px 10px; border-radius:999px;
      border:1px solid rgba(15,23,42,.10);
      background:rgba(255,255,255,.7);
      color:#475569;
      font-size:12px;
    }
    .dot{ width:8px; height:8px; border-radius:50%; display:inline-block; }
    .dot.warn{ background:#d97706; }
    .dot.info{ background:#0284c7; }
    .dot.ok{ background:#16a34a; }
    .dot.bad{ background:#dc2626; }
    .dot.brand{ background:#2563eb; }
    .dot.muted{ background:#94a3b8; }

    .colTitle{ font-weight:800; margin:0 0 10px; display:flex; justify-content:space-between; }
    .muted{ color:#64748b; font-size:12px; }
    .divider{ height:1px; background: rgba(15,23,42,.10); margin:12px 0; }

    .visitCard{
      border:1px solid rgba(15,23,42,.10);
      border-radius:14px;
      padding:12px;
      background:#fff;
      box-shadow:0 8px 16px rgba(2,6,23,.06);
      margin-bottom:10px;
    }
    .visitCard b{ font-size:14px; }
    .meta{ display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }

    .toast-wrap{
      position:fixed; right:14px; bottom:14px; z-index:9999;
      display:flex; flex-direction:column; gap:10px; max-width:380px;
    }
    .toast{
      border-radius:14px;
      border:1px solid rgba(15,23,42,.10);
      background:rgba(255,255,255,.96);
      box-shadow:0 18px 35px rgba(2,6,23,.12);
      padding:10px 12px;
      display:flex; gap:10px; align-items:flex-start;
    }
    .toast b{ display:block; font-size:13px; margin-bottom:2px; }
    .toast p{ margin:0; font-size:12px; color:#475569; }
    .toast .badge{ width:10px; height:10px; border-radius:999px; margin-top:4px; flex:0 0 auto; }

    .table{ width:100%; border-collapse:separate; border-spacing:0; overflow:hidden; border:1px solid rgba(15,23,42,.10); border-radius:12px; }
    .table th, .table td{ padding:10px; font-size:12px; border-bottom:1px solid rgba(15,23,42,.08); text-align:left; vertical-align:top; }
    .table th{ color:#475569; background: rgba(2,6,23,.04); }
    .table tr:hover td{ background: rgba(2,6,23,.03); }
    .table td code{ color:#2563eb; }

    #reader{
      width:100%;
      border-radius:14px;
      overflow:hidden;
      border:1px solid rgba(15,23,42,.12);
      background:#fff;
    }

    /* ===== Semáforo en la tarjeta (solo visual) ===== */
    .visitCard.rag-ok{
      border-color: rgba(22,163,74,.55);
      background: rgba(22,163,74,.08);
      box-shadow: inset 6px 0 0 rgba(22,163,74,.70), 0 8px 16px rgba(2,6,23,.06);
    }
    .visitCard.rag-warn{
      border-color: rgba(217,119,6,.55);
      background: rgba(217,119,6,.10);
      box-shadow: inset 6px 0 0 rgba(217,119,6,.75), 0 8px 16px rgba(2,6,23,.06);
    }
    .visitCard.rag-bad{
      border-color: rgba(220,38,38,.55);
      background: rgba(220,38,38,.10);
      box-shadow: inset 6px 0 0 rgba(220,38,38,.75), 0 8px 16px rgba(2,6,23,.06);
    }

    /* ===== Modal (Incidencias / PIN / QR) ===== */
    .modal-backdrop{
      position:fixed; inset:0;
      background: rgba(0,0,0,.35);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
      z-index:99999;
    }
    .modal{
      width:min(560px, 96vw);
      background:#fff;
      border:1px solid rgba(15,23,42,.12);
      border-radius:14px;
      box-shadow:0 18px 40px rgba(2,6,23,.18);
      padding:16px;
    }
    .modal h3{ margin:0 0 6px; }
    .modal .muted{ margin:0 0 10px; }
    .modal textarea{
      width:100%;
      min-height:110px;
      resize:vertical;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid #cbd5f5;
      font-size:14px;
      background:#fff;
    }
  </style>

  <!-- ========= FIREBASE (CDN modular) ========= -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      onAuthStateChanged,
      signOut,
      createUserWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import {
      getFirestore,
      collection,
      doc,
      getDoc,
      getDocs,

    // ✅ Tu config real (misma que tu index actual)
   const firebaseConfig = {
      apiKey: "AIzaSyA0mn8aVRKPpF-yiNVTb2FKqyhHg3lQmpg",
      authDomain: "visitantes-d671e.firebaseapp.com",
      projectId: "visitantes-d671e",
      storageBucket: "visitantes-d671e.appspot.com",
      messagingSenderId: "697592280672",

    // App principal (sesión guardia/admin/anfitrión)

    // App secundaria para crear usuarios SIN tumbar la sesión del admin
    const app2 = initializeApp(firebaseConfig, "Secondary");
    const auth2 = getAuth(app2);

    window.__FB__ = {
      auth, auth2, db,

</head>

<body>
<header>
  <div class="container row">
    <div class="pill"><span class="dot brand"></span><b style="color:#0f172a">Visitantes</b> · Control de Accesos</div>
    <div class="spacer"></div>
    <div id="userPill" class="pill" style="display:none;"></div>
    <button id="btnLogout" class="secondary" style="display:none;">Cerrar sesión</button>
  </div>
</header>

<main class="container">
  <div id="app"></div>
</main>
<div class="toast-wrap" id="toasts"></div>

<script>
(() => {
  "use strict";

  const appEl = document.getElementById("app");
  const toasts = document.getElementById("toasts");
  const userPill = document.getElementById("userPill");
  const btnLogout = document.getElementById("btnLogout");

  const ROLES = { ADMIN:"admin", GUARDIA:"guardia", ANFITRION:"anfitrion" };

  const Status = {
    PROGRAMADO: "programado",
    AUTORIZACION: "autorizacion",
    RECHAZADO: "rechazado",
    LLEGADO: "llegado",
    DENTRO: "dentro",
    FINALIZADO: "finalizado"
  };

  const WAIT_GREEN_MAX = 5;
  const WAIT_YELLOW_MAX = 15;

  const VIEWS = {
    LOGIN: "login",
    DASH: "dash",
    SCAN: "scan",
    ALTA: "alta",
    VIS: "visitantes",
    CITA: "cita",
    USERS: "usuarios"
  };

  let view = VIEWS.LOGIN;
  let currentUser = null;
  let userProfile = null;
  let userRole = null;
  let unsubscribeHoy = null;
  let visitasHoy = [];
  let scanner = null;

  const $ = (sel, root=document) => root.querySelector(sel);
  const esc = (s="") => String(s ?? "").replace(/[&<>"']/g, ch => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[ch] || ch));

  function toast(title, msg, type="info", ttl=2600){
    const badgeColor =
      type==="ok" ? "#16a34a" :
      type==="warn" ? "#d97706" :
      type==="bad" ? "#dc2626" : "#0284c7";
    const el = document.createElement("div");
    el.className = "toast";
    el.innerHTML = `
      <span class="badge" style="background:${badgeColor}"></span>
      <div><b>${esc(title)}</b><p>${esc(msg)}</p></div>
    `;
    toasts.appendChild(el);
    setTimeout(() => el.remove(), ttl);
  }

  function goTo(next){
    view = next;
    if(view === VIEWS.LOGIN) return renderLogin();
    if(view === VIEWS.DASH) return renderDashboard();
    if(view === VIEWS.SCAN) return renderScanner();
    if(view === VIEWS.ALTA) return renderAltaUsuario();
    if(view === VIEWS.VIS) return renderVisitantes();
    if(view === VIEWS.CITA) return renderNuevaCita();
    if(view === VIEWS.USERS) return renderUsuarios();
  }

  function dayBounds(d=new Date()){
    const x = new Date(d);
    x.setHours(0,0,0,0);
    return { start: x.getTime(), end: x.getTime() + 24*60*60*1000 };
  }
  function mins(ms){ return Math.max(0, Math.round(ms / 60000)); }

  function calcTimes(v){
    const now = Date.now();
    const llegada = v.llegadaTs ?? null;
    const entrada = v.entradaTs ?? null;
    const salida  = v.salidaTs  ?? null;

    const esperaMin =
      (entrada && llegada) ? mins(entrada - llegada) :
      (v.status === Status.LLEGADO && llegada) ? mins(now - llegada) : null;

    const dentroMin = (salida && entrada) ? mins(salida - entrada) : null;
    const totalMin  = (salida && llegada) ? mins(salida - llegada) : null;
    return { esperaMin, dentroMin, totalMin };
  }

  function waitRag(esperaMin){
    if(esperaMin == null) return null;
    if(esperaMin <= WAIT_GREEN_MAX) return { dot:"ok", label:"VERDE" };
    if(esperaMin <= WAIT_YELLOW_MAX) return { dot:"warn", label:"AMARILLO" };
    return { dot:"bad", label:"ROJO" };
  }

  function waitChip(esperaMin){
    const r = waitRag(esperaMin);
    if(!r) return "";
    const bg = r.dot === "ok" ? "rgba(22,163,74,.12)" : r.dot === "warn" ? "rgba(217,119,6,.14)" : "rgba(220,38,38,.14)";
    const br = r.dot === "ok" ? "rgba(22,163,74,.45)" : r.dot === "warn" ? "rgba(217,119,6,.45)" : "rgba(220,38,38,.45)";
    return `<span class="pill" title="Semáforo de espera (Llegado→Dentro)" style="background:${bg}; border-color:${br};">
      <span class="dot ${r.dot}"></span>
      Espera: <b style="color:#0f172a">${esperaMin} min</b> · ${r.label}
    </span>`;
  }

  function statusPill(v){
    if(v.status === Status.PROGRAMADO) return `<span class="pill"><span class="dot info"></span>PROGRAMADO</span>`;
    if(v.status === Status.AUTORIZACION) return `<span class="pill"><span class="dot warn"></span>PEND. AUTORIZACIÓN</span>`;
    if(v.status === Status.RECHAZADO) return `<span class="pill"><span class="dot bad"></span>RECHAZADO</span>`;
    if(v.status === Status.LLEGADO) return `<span class="pill"><span class="dot warn"></span>LLEGÓ</span>`;
    if(v.status === Status.DENTRO) return `<span class="pill"><span class="dot ok"></span>DENTRO</span>`;
    return `<span class="pill"><span class="dot muted"></span>FINALIZADO</span>`;
  }

  function qrPill(v){
    return v.qrActivo
      ? `<span class="pill"><span class="dot ok"></span>QR Activo</span>`
      : `<span class="pill"><span class="dot bad"></span>QR Inactivo</span>`;
  }

  function citaChip(v){
    if(v.status !== Status.PROGRAMADO) return "";
    const f = v.fechaProgramada || "";
    const h = v.horaProgramada || "";
    if(!f && !h) return `<span class="pill"><span class="dot info"></span>Cita programada</span>`;
    return `<span class="pill"><span class="dot info"></span>Cita: <b style="color:#0f172a">${esc(f)} ${esc(h)}</b></span>`;
  }

  // ====== FILTRO: Anfitrión solo ve sus visitantes ======
  function norm(s){
    return String(s ?? "").trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
  }
  function getVisibleVisitas(list){
    if(String(userRole||"").toLowerCase() === ROLES.ANFITRION){
      const me = norm(userProfile?.nombre || "");
      return (list||[]).filter(v => norm(v?.personaVisita) === me);
    }
    return list || [];
  }

  // ===== Modales =====
  function askIncidenciaSalida({ nombre, id }){
    return new Promise((resolve) => {
      const back = document.createElement("div");
      back.className = "modal-backdrop";
      back.innerHTML = `
        <div class="modal">
          <h3>Registrar salida</h3>
          <p class="muted">Visitante: <b>${esc(nombre || "-")}</b> · ID: <b>${esc(id || "")}</b></p>
          <label>Incidencias (opcional)</label>
          <textarea id="incTxt" placeholder="Ej. No devolvió gafete a la primera, se detectó objeto no permitido, se negó a firmar, etc."></textarea>
          <div style="height:12px"></div>
          <div class="row" style="justify-content:flex-end;">
            <button class="secondary" id="btnCancelInc">Cancelar</button>
            <button class="danger" id="btnOkInc">Confirmar salida</button>
          </div>
        </div>
      `;
      document.body.appendChild(back);
      const close = () => { try{ back.remove(); }catch{} };
      back.addEventListener("click", (e) => { if(e.target === back){ close(); resolve(null); } });
      back.querySelector("#btnCancelInc").onclick = () => { close(); resolve(null); };
      back.querySelector("#btnOkInc").onclick = () => {
        const val = (back.querySelector("#incTxt").value || "").trim();
        close();
        resolve(val);
      };
      setTimeout(() => back.querySelector("#incTxt")?.focus(), 0);
    });
  }

  function askPin({ title = "Validación requerida", subtitle = "Ingresa tu PIN para continuar" } = {}){
    return new Promise((resolve) => {
      const back = document.createElement("div");
      back.className = "modal-backdrop";
      back.innerHTML = `
        <div class="modal">
          <h3>${esc(title)}</h3>
          <p class="muted">${esc(subtitle)}</p>
          <label>PIN</label>
          <input id="pinTxt" type="password" inputmode="numeric" maxlength="10" placeholder="••••" autocomplete="off" />
          <div style="height:12px"></div>
          <div class="row" style="justify-content:flex-end;">
            <button class="secondary" id="btnCancelPin">Cancelar</button>
            <button class="ok" id="btnOkPin">Confirmar</button>
          </div>
          <div class="muted" style="margin-top:10px;">Se valida contra <b>/users</b> (pinAutorizacion).</div>
        </div>
      `;
      document.body.appendChild(back);
      const close = () => { try{ back.remove(); }catch{} };
      back.addEventListener("click", (e) => { if(e.target === back){ close(); resolve(null); } });
      const pinEl = back.querySelector("#pinTxt");
      const ok = () => {
        const val = (pinEl.value || "").trim();
        close();
        resolve(val || null);
      };
      back.querySelector("#btnCancelPin").onclick = () => { close(); resolve(null); };
      back.querySelector("#btnOkPin").onclick = ok;
      pinEl.addEventListener("keydown", (ev) => {
        if(ev.key === "Enter") ok();
        if(ev.key === "Escape"){ close(); resolve(null); }
      });
      setTimeout(() => pinEl?.focus(), 0);
    });
  }

  async function requirePin(actionLabel = "continuar"){
    const expected = String(userProfile?.pinAutorizacion || "").trim();
    if(!expected){
      toast("PIN no configurado", "Tu usuario no tiene pinAutorizacion en /users.", "warn", 4200);
      return false;
    }
    const pin = await askPin({ subtitle: `Ingresa tu PIN para ${actionLabel}.` });
    if(pin === null) return false;
    if(String(pin).trim() !== expected){
      toast("PIN incorrecto", "No autorizado.", "bad", 3200);
      return false;
    }
    return true;
  }

  function openQrModal({ id, title="QR de visitante", subtitle="" }){
    return new Promise((resolve) => {
      const back = document.createElement("div");
      back.className = "modal-backdrop";
      back.innerHTML = `
        <div class="modal">
          <h3>${esc(title)}</h3>
          <p class="muted">${esc(subtitle)}<br>ID: <b>${esc(id)}</b></p>
          <div class="row" style="justify-content:center;">
            <div id="qrBox" style="padding:10px;background:#fff;border-radius:14px;border:1px solid rgba(15,23,42,.12);"></div>
          </div>
          <div style="height:12px"></div>
          <div class="row" style="justify-content:flex-end;">
            <button class="secondary" id="btnCerrarQR">Cerrar</button>
            <button class="secondary" id="btnGuardarQR">Guardar QR</button>
            <button class="secondary" id="btnCompartirQR">Compartir QR</button>
          </div>
          <div class="muted" style="margin-top:10px;">Este QR identifica la visita. Para acceso debe estar en <b>LLEGADO</b>.</div>
        </div>
      `;
      document.body.appendChild(back);
      const close = () => { try{ back.remove(); }catch{} resolve(); };
      back.addEventListener("click", (e) => { if(e.target === back) close(); });
      back.querySelector("#btnCerrarQR").onclick = close;

      const qrBox = back.querySelector("#qrBox");
      qrBox.innerHTML = "";
      if(!window.QRCode){
        toast("QR", "No cargó QRCode.js (revisa el script CDN).", "bad", 4200);
        return close();
      }
      new QRCode(qrBox, { text: id, width: 220, height: 220 });

      const canvas = qrBox.querySelector("canvas");
      const qrDataUrl = canvas?.toDataURL?.("image/png");

      back.querySelector("#btnGuardarQR").onclick = () => {
        if(!qrDataUrl) return toast("QR", "No se pudo generar el QR.", "bad", 3000);
        const a = document.createElement("a");
        a.href = qrDataUrl;
        a.download = `QR-${id}.png`;
        a.click();
      };

      back.querySelector("#btnCompartirQR").onclick = async () => {
        if(!qrDataUrl || !navigator.share){
          toast("Compartir", "Tu dispositivo no soporta compartir. Usa Guardar o captura.", "warn", 3500);
          return;
        }
        try{
          const blob = await (await fetch(qrDataUrl)).blob();
          const file = new File([blob], `QR-${id}.png`, { type: "image/png" });
          await navigator.share({ title: "QR de Visitante", text: `QR para la visita (${id})`, files: [file] });
        }catch(e){
          console.error(e);
          toast("Compartir", "No se pudo compartir el QR.", "bad", 3500);
        }
      };
    });
  }

  // ---------- AUTH + ROLE ----------
  async function loadUserProfile(uid){
    const { db, doc, getDoc } = window.__FB__;
    const snap = await getDoc(doc(db, "users", uid));
    if(!snap.exists()) return null;
    return snap.data();
  }

  function paintUser(){
    if(!currentUser){
      userPill.style.display = "none";
      btnLogout.style.display = "none";
      return;
    }
    userPill.style.display = "";
    btnLogout.style.display = "";
    const nombre = userProfile?.nombre || currentUser.email || "sesión";
    const rol = String(userRole || "").toUpperCase();
    userPill.innerHTML = `<span class="dot ok"></span>${esc(nombre)} · ${esc(rol)}`;
  }

  btnLogout.onclick = async () => {
    stopScanner();
    stopListenerHoy();
    try{
      const { auth, signOut } = window.__FB__;
      await signOut(auth);
    }catch{}
  };

  // ---------- VIEWS ----------
  function renderLogin(){
    paintUser();
    appEl.innerHTML = `
      <div class="card" style="max-width:420px;margin:30px auto;">
        <h2 style="margin:0 0 6px;">Iniciar sesión</h2>
        <div class="muted">Guardia / Admin / Anfitrión (Email y contraseña)</div>
        <label>Correo</label>
        <input id="email" type="email" autocomplete="off" />
        <label>Contraseña</label>
        <input id="pass" type="password" />
        <div style="height:12px"></div>
        <div class="row">
          <button id="btnLogin">Entrar</button>
        </div>
        <div style="height:12px"></div>
        <div class="muted">Cámara: usar <b>https</b> o <b>localhost</b>.</div>
      </div>
    `;
    $("#btnLogin").onclick = async () => {
      const email = ($("#email").value || "").trim();
      const pass  = ($("#pass").value  || "").trim();
      if(!email || !pass) return toast("Faltan datos","Correo y contraseña.", "warn");
      try{
        const { auth, signInWithEmailAndPassword } = window.__FB__;
        await signInWithEmailAndPassword(auth, email, pass);
      }catch(e){
        console.error(e);

  function renderVisitCard(v){
    const t = calcTimes(v);
    const chips = [];

    if(v.status === Status.LLEGADO && t.esperaMin !== null){
      chips.push(waitChip(t.esperaMin));
    }
    if(t.dentroMin !== null) chips.push(`<span class="pill"><span class="dot brand"></span>Dentro: <b style="color:#0f172a">${t.dentroMin} min</b></span>`);
    if(t.totalMin !== null) chips.push(`<span class="pill"><span class="dot muted"></span>Total: <b style="color:#0f172a">${t.totalMin} min</b></span>`);
    if(v.gafeteNo) chips.push(`<span class="pill"><span class="dot info"></span>Gafete: <b style="color:#0f172a">${esc(v.gafeteNo)}</b></span>`);
    if(v.incidenciasSalida) chips.push(`<span class="pill"><span class="dot warn"></span>Incidencia</span>`);

    const cc = citaChip(v);
    if(cc) chips.push(cc);

    const acciones = [];

    // PROGRAMADO: ver QR + marcar llegada (no anfitrión)
    if(v.status === Status.PROGRAMADO && v.qrActivo){
      acciones.push(`<button class="secondary" data-act="verQR" data-id="${esc(v.id)}">Ver QR</button>`);
      if(userRole !== ROLES.ANFITRION){
        acciones.push(`<button class="ok" data-act="marcarLlegada" data-id="${esc(v.id)}">Marcar llegada</button>`);
      }
    }

    // AUTORIZACION: solo admin + anfitrión (con PIN en handler)
    if(v.status === Status.AUTORIZACION && v.qrActivo){
      if(userRole === ROLES.ADMIN || userRole === ROLES.ANFITRION){
        acciones.push(`<button class="ok" data-act="autorizar" data-id="${esc(v.id)}">Autorizar</button>`);
        acciones.push(`<button class="danger" data-act="rechazar" data-id="${esc(v.id)}">Rechazar</button>`);
      }
    }

    // LLEGADO/DENTRO: solo guardia o admin
    if(v.status === Status.LLEGADO && v.qrActivo && userRole !== ROLES.ANFITRION){
      acciones.push(`<button class="ok" data-act="darAcceso" data-id="${esc(v.id)}">Dar acceso</button>`);
    }
    if(v.status === Status.DENTRO && v.qrActivo && userRole !== ROLES.ANFITRION){
      acciones.push(`<button class="danger" data-act="darSalida" data-id="${esc(v.id)}">Dar salida</button>`);
    }

    let ragClass = "";
    if(v.status === Status.LLEGADO){
      const w = calcTimes(v).esperaMin;
      const r = waitRag(w);
      if(r?.dot === "ok") ragClass = "rag-ok";
      else if(r?.dot === "warn") ragClass = "rag-warn";
      else if(r?.dot === "bad") ragClass = "rag-bad";
    }

    return `
      <div class="visitCard ${ragClass}">
        <div class="row" style="justify-content:space-between;">
          <div>
            <b>${esc(v.nombreVisitante || "-")}</b>
            <div class="muted">${esc(v.empresa || "")} · Visita a: <b>${esc(v.personaVisita || "-")}</b></div>
            <div class="muted">ID: <b>${esc(v.id)}</b></div>
            <div class="meta">
              ${statusPill(v)}
              ${qrPill(v)}
              ${chips.join("")}
            </div>
          </div>
          <div class="row" style="justify-content:flex-end;">
            ${acciones.join("")}
          </div>
        </div>
      </div>
    `;
  }

  async function crearUsuarioDesdeAdmin(){
    const nombre = ($("#uNombre").value || "").trim();
    const email  = ($("#uEmail").value  || "").trim();
    const pass   = ($("#uPass").value   || "").trim();
    const rol    = ($("#uRol").value    || "").trim();
    const pin    = ($("#uPin").value    || "").trim();
    const msg = $("#uMsg");
    msg.textContent = "";

    if(!nombre || !email || !pass){
      msg.textContent = "Completa nombre, correo y contraseña.";
      return;
    }

    try{
      const { auth2, createUserWithEmailAndPassword, signOut, db, doc, setDoc } = window.__FB__;
      const cred = await createUserWithEmailAndPassword(auth2, email, pass);
      const uid = cred.user.uid;

      await setDoc(doc(db, "users", uid), {
        uid,
        nombre,
        email,
        rol,
        activo: true,
        createdTs: Date.now(),
        pinAutorizacion: pin || ""
      });

      try{ await signOut(auth2); }catch{}

      msg.textContent = "✅ Usuario creado, rol y PIN guardados.";
      toast("Alta usuario","Usuario creado correctamente.", "ok", 2200);

      $("#uNombre").value = "";
      $("#uEmail").value = "";

      $("#uRol").value = ROLES.GUARDIA;
      $("#uPin").value = "";

      msg.textContent = e?.message || "Error al crear usuario.";
      toast("Error", msg.textContent, "bad", 4200);
    }
  }

  async function crearCitaProgramada(){

  // ---------- Visitantes (Tabla) ----------
  async function fetchVisitantesByDay(dateISO){
    const { db, collection, query, where, getDocs, limit } = window.__FB__;
    const start = new Date(dateISO + "T00:00:00").getTime();
    const end = new Date(dateISO + "T23:59:59").getTime();

    const q = query(
      collection(db, "visitas"),
      where("tipo", "==", "visitante"),
      where("createdTs", ">=", start),
      where("createdTs", "<=", end),
      limit(800)
    );

    const snap = await getDocs(q);
    const arr = [];
    snap.forEach(d => arr.push({ id: d.id, ...d.data() }));
    arr.sort((a,b) => (b.llegadaTs || b.createdTs || 0) - (a.llegadaTs || a.createdTs || 0));

    return getVisibleVisitas(arr);
  }

  async function loadVisitantes(){
    const fecha = document.getElementById('visFecha')?.value;
    const status = (document.getElementById('visStatus')?.value || '').trim();
    const term = (document.getElementById('visSearch')?.value || '').trim().toLowerCase();
    const resEl = document.getElementById('visResumen');
    const tabEl = document.getElementById('visTabla');
    if(!fecha || !resEl || !tabEl) return;

    resEl.innerHTML = `<span class="pill"><span class="dot info"></span>Cargando…</span>`;
    tabEl.innerHTML = '';

    try{
      const hoyISO = new Date().toISOString().slice(0,10);
      let list = [];
      if(fecha === hoyISO){
        list = getVisibleVisitas(visitasHoy).filter(x => x.tipo === 'visitante');
        list.sort((a,b) => (b.llegadaTs || b.createdTs || 0) - (a.llegadaTs || a.createdTs || 0));
      }else{
        list = await fetchVisitantesByDay(fecha);
      }

      if(status) list = list.filter(v => (v.status || '') === status);

      if(term){
        list = list.filter(v =>
          String(v.id || '').toLowerCase().includes(term) ||
          String(v.nombreVisitante || '').toLowerCase().includes(term) ||
          String(v.empresa || '').toLowerCase().includes(term) ||
          String(v.personaVisita || '').toLowerCase().includes(term) ||
          String(v.motivoVisita || '').toLowerCase().includes(term)
        );
      }

      const total = list.length;
      const cProg = list.filter(v => v.status === Status.PROGRAMADO).length;
      const cAut  = list.filter(v => v.status === Status.AUTORIZACION).length;
      const cLleg = list.filter(v => v.status === Status.LLEGADO).length;
      const cDen  = list.filter(v => v.status === Status.DENTRO).length;
      const cFin  = list.filter(v => v.status === Status.FINALIZADO).length;
      const cRech = list.filter(v => v.status === Status.RECHAZADO).length;

      resEl.innerHTML = `
        <span class="pill"><span class="dot brand"></span>Total: <b style="color:#0f172a; margin-left:6px;">${total}</b></span>
        <span class="pill"><span class="dot info"></span>Programados: <b style="color:#0f172a; margin-left:6px;">${cProg}</b></span>
        <span class="pill"><span class="dot warn"></span>Autorización: <b style="color:#0f172a; margin-left:6px;">${cAut}</b></span>
        <span class="pill"><span class="dot warn"></span>Llegados: <b style="color:#0f172a; margin-left:6px;">${cLleg}</b></span>
        <span class="pill"><span class="dot ok"></span>Dentro: <b style="color:#0f172a; margin-left:6px;">${cDen}</b></span>
        <span class="pill"><span class="dot muted"></span>Finalizados: <b style="color:#0f172a; margin-left:6px;">${cFin}</b></span>
        <span class="pill"><span class="dot bad"></span>Rechazados: <b style="color:#0f172a; margin-left:6px;">${cRech}</b></span>
      `;

      if(!list.length){
        tabEl.innerHTML = `<div class="muted">Sin registros con esos filtros.</div>`;
        return;
      }

      const badge = (s) => {
        if(s === Status.PROGRAMADO) return `<span class="pill"><span class="dot info"></span>PROGRAMADO</span>`;
        if(s === Status.AUTORIZACION) return `<span class="pill"><span class="dot warn"></span>AUTORIZACIÓN</span>`;
        if(s === Status.LLEGADO) return `<span class="pill"><span class="dot warn"></span>LLEGADO</span>`;
        if(s === Status.DENTRO) return `<span class="pill"><span class="dot ok"></span>DENTRO</span>`;
        if(s === Status.FINALIZADO) return `<span class="pill"><span class="dot muted"></span>FINALIZADO</span>`;
        if(s === Status.RECHAZADO) return `<span class="pill"><span class="dot bad"></span>RECHAZADO</span>`;
        return `<span class="pill">${esc(s || '-')}</span>`;
      };

      tabEl.innerHTML = `
        <table class="table">
          <thead>
            <tr>
              <th>Hora</th>
              <th>Visitante</th>
              <th>Empresa</th>
              <th>Motivo</th>
              <th>Visita a</th>
              <th>Estatus</th>
            </tr>
          </thead>
          <tbody>
            ${list.map(v => {
              const hora = v.llegadaTs ? new Date(v.llegadaTs).toLocaleTimeString() : (v.horaProgramada || '-');
              return `
                <tr>
                  <td>${esc(hora)}</td>
                  <td><b>${esc(v.nombreVisitante || '-')}</b><br><code>${esc(v.id)}</code></td>
                  <td>${esc(v.empresa || '-')}</td>
                  <td>${esc(v.motivoVisita || '-')}</td>
                  <td>${esc(v.personaVisita || '-')}</td>
                  <td>${badge(v.status || '-') }</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      `;

    }catch(e){
      console.error(e);
      resEl.innerHTML = `<span class="pill"><span class="dot bad"></span>Error</span>`;
      tabEl.innerHTML = `<div class="muted">Error cargando visitantes (Rules/Internet).</div>`;
      toast('Visitantes','No se pudo cargar. Revisa conexión y Rules.','bad',4200);
    }
  }

  // ---------- Usuarios (solo Admin) ----------
  function renderUsuarios(){
    if(userRole !== ROLES.ADMIN){
      toast("Acceso denegado", "Solo ADMIN puede ver usuarios.", "bad", 3200);
      return goTo(VIEWS.DASH);
    }

    appEl.innerHTML = `
      <div class="card">
        <div class="row" style="justify-content:space-between;">
          <div>
            <h2 style="margin:0 0 4px;">Usuarios</h2>
            <div class="muted">Listado de usuarios del sistema</div>
          </div>
          <button class="secondary" data-act="volverUsuarios">Volver</button>
        </div>
        <div class="divider"></div>
        <div id="usersTable" class="muted">Cargando usuarios…</div>
      </div>
    `;

    loadUsuarios();
  }

  async function loadUsuarios(){
    const { db, collection, getDocs } = window.__FB__;
    const cont = document.getElementById("usersTable");
    try{
      const snap = await getDocs(collection(db, "users"));
      const rows = [];
      snap.forEach(d => {
        const u = d.data() || {};
        rows.push(`
          <tr>
            <td><b>${esc(u.nombre || '-') }</b></td>
            <td>${esc(u.email || '-') }</td>
            <td>${esc(String(u.rol || '-').toUpperCase())}</td>
            <td>${u.pinAutorizacion ? '●●●●' : '-'}</td>
            <td>${u.activo === false ? 'No' : 'Sí'}</td>
          </tr>
        `);
      });
      cont.innerHTML = `
        <table class="table">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Email</th>
              <th>Rol</th>
              <th>PIN</th>
              <th>Activo</th>
            </tr>
          </thead>
          <tbody>${rows.join('')}</tbody>
        </table>
      `;
    }catch(e){
      console.error(e);
      cont.innerHTML = `<div class="muted">No se pudieron cargar los usuarios.</div>`;
    }
  }

  // ---------- Scanner ----------
  function renderScanner(){
    if(userRole === ROLES.ANFITRION){
      toast("No permitido","El rol Anfitrión no usa escáner.", "warn", 2600);
      return goTo(VIEWS.DASH);
    }

    appEl.innerHTML = `
      <div class="card" style="max-width:900px;margin:0 auto;">
        <div class="row" style="justify-content:space-between;">
          <div>
            <h2 style="margin:0 0 6px;">Escanear QR</h2>
            <div class="muted">Apunta la cámara al QR del visitante.</div>
          </div>
          <button class="secondary" id="btnBackScan">Volver</button>
        </div>
        <div style="height:12px"></div>
        <div id="reader"></div>
        <div style="height:12px"></div>
        <div class="muted">Si la cámara no abre: usar <b>https</b> o <b>localhost</b>.</div>
      </div>
    `;

    $("#btnBackScan").onclick = () => { stopScanner(); goTo(VIEWS.DASH); };

    if(!window.Html5QrcodeScanner){
      toast("Escáner","No cargó html5-qrcode. Revisa el script CDN.", "bad", 4200);
      return goTo(VIEWS.DASH);
    }

    stopScanner();

    const config = {
      fps: 10,
      qrbox: { width: 250, height: 250 },
      videoConstraints: { facingMode: "environment" }
    };

    scanner = new Html5QrcodeScanner("reader", config, false);
    scanner.render(async (decodedText) => {
      try{ await scanner.clear(); }catch{}
      scanner = null;
      await handleScan(String(decodedText || "").trim());
    }, () => {});
  }

  async function stopScanner(){
    if(scanner){
      try{ await scanner.clear(); }catch{}
      scanner = null;
    }
  }

  async function manualById(){
    const id = prompt("Ingresa el ID (del QR), ejemplo: VIS-1713...");
    if(!id) return;
    await handleScan(String(id).trim());
  }

  async function handleScan(id){
    if(!id){
      toast("QR","Código vacío.", "warn");
      return goTo(VIEWS.DASH);
    }

    const { db, doc, getDoc } = window.__FB__;
    let snap;
    try{
      snap = await getDoc(doc(db, "visitas", id));
    }catch(e){
      console.error(e);
      toast("Firestore","No se pudo consultar (conexión/rules).", "bad", 4200);
      return goTo(VIEWS.DASH);
    }

    if(!snap.exists()){
      toast("QR inválido","No existe ese ID en la base.", "bad", 3200);
      return goTo(VIEWS.DASH);
    }

    const v = { id: snap.id, ...snap.data() };

    if(v.tipo !== "visitante"){
      toast("No permitido","Este QR no es de visitantes.", "warn", 3200);
      return goTo(VIEWS.DASH);
    }

    if(!v.qrActivo){
      toast("QR inactivo","Ya fue desactivado al finalizar/rechazar.", "warn", 3200);
      return goTo(VIEWS.DASH);
    }

    // Bloqueos por estatus
    if(v.status === Status.PROGRAMADO){
      toast("Cita programada","Primero marca llegada (PROGRAMADO → LLEGADO).", "warn", 3600);
      return goTo(VIEWS.DASH);
    }
    if(v.status === Status.AUTORIZACION){
      toast("Pendiente","Aún no está autorizada.", "warn", 3200);
      return goTo(VIEWS.DASH);
    }
    if(v.status === Status.RECHAZADO){
      toast("Rechazado","Esta visita fue rechazada.", "bad", 3200);
      return goTo(VIEWS.DASH);
    }

    if(v.status === Status.LLEGADO){
      const gafete = prompt("No. de gafete:");
      if(!gafete) return goTo(VIEWS.DASH);
      await darAcceso(v.id, String(gafete).trim());
      return;
    }

    if(v.status === Status.DENTRO){
      const inc = await askIncidenciaSalida({ nombre: v.nombreVisitante, id: v.id });
      if(inc === null) return goTo(VIEWS.DASH);
      await darSalida(v.id, inc);
      return;
    }

    toast("Sin acción","Este registro ya está finalizado.", "info", 2400);
    return goTo(VIEWS.DASH);
  }

  async function darAcceso(id, gafeteNo){
    const { db, doc, updateDoc } = window.__FB__;
    try{
      await updateDoc(doc(db, "visitas", id), {
        status: Status.DENTRO,
        entradaTs: Date.now(),
        gafeteNo,
        updatedTs: Date.now()
      });
      toast("Acceso otorgado","Visitante dentro.", "ok", 2200);
      goTo(VIEWS.DASH);
    }catch(e){
      console.error(e);
      toast("Error","No se pudo registrar entrada.", "bad", 4200);
      goTo(VIEWS.DASH);
    }
  }

  async function darSalida(id, incidenciasTexto){
    const { db, doc, updateDoc } = window.__FB__;
    try{
      await updateDoc(doc(db, "visitas", id), {
        status: Status.FINALIZADO,
        salidaTs: Date.now(),
        qrActivo: false,
        gafeteNo: null,
        updatedTs: Date.now(),
        incidenciasSalida: (incidenciasTexto || "").trim(),
        salidaPor: userProfile?.nombre || currentUser?.email || "",
        salidaPorUid: currentUser?.uid || ""
      });
      toast("Salida registrada", incidenciasTexto ? "Finalizado con incidencias." : "Finalizado (sin incidencias).", "ok", 2400);
      goTo(VIEWS.DASH);
    }catch(e){
      console.error(e);
      toast("Error","No se pudo registrar salida.", "bad", 4200);
      goTo(VIEWS.DASH);
    }
  }

  // ---------- Acciones adicionales ----------
  async function marcarLlegada(id){
    const { db, doc, updateDoc } = window.__FB__;
    try{
      await updateDoc(doc(db, "visitas", id), {
        status: Status.LLEGADO,
        llegadaTs: Date.now(),
        updatedTs: Date.now()
      });
      toast("Llegada registrada","Ahora está en LLEGADO.", "ok", 2200);
      goTo(VIEWS.DASH);
    }catch(e){
      console.error(e);
      toast("Error","No se pudo marcar llegada.", "bad", 4200);
      goTo(VIEWS.DASH);
    }
  }

  async function autorizarVisita(id){
    const { db, doc, updateDoc } = window.__FB__;
    try{
      await updateDoc(doc(db, "visitas", id), {
        status: Status.LLEGADO,
        llegadaTs: Date.now(),
        autorizadoTs: Date.now(),
        autorizadoPor: userProfile?.nombre || currentUser?.email || "",
        updatedTs: Date.now()
      });
      toast("Autorizado","Pasó a LLEGADO.", "ok", 2200);
      goTo(VIEWS.DASH);
    }catch(e){
      console.error(e);
      toast("Error","No se pudo autorizar.", "bad", 4200);
      goTo(VIEWS.DASH);
    }
  }

  async function rechazarVisita(id){
    const { db, doc, updateDoc } = window.__FB__;
    try{
      await updateDoc(doc(db, "visitas", id), {
        status: Status.RECHAZADO,
        qrActivo: false,
        autorizadoTs: Date.now(),
        autorizadoPor: userProfile?.nombre || currentUser?.email || "",
        updatedTs: Date.now()
      });
      toast("Rechazado","Se desactivó el QR.", "ok", 2400);
      goTo(VIEWS.DASH);
    }catch(e){
      console.error(e);
      toast("Error","No se pudo rechazar.", "bad", 4200);
      goTo(VIEWS.DASH);
    }
  }

  // Click actions
  document.addEventListener("click", async (e) => {
    const btn = e.target.closest("[data-act]");
    if(!btn) return;

    const act = btn.dataset.act;
    const id  = btn.dataset.id;

    if(act === "visitantes") return goTo(VIEWS.VIS);
    if(act === "usuarios") return goTo(VIEWS.USERS);
    if(act === "volverUsuarios") return goTo(VIEWS.DASH);
    if(act === "loadVisitantes") return await loadVisitantes();
    if(act === "volverVisitantes") return goTo(VIEWS.DASH);

    if(act === "verQR"){
      await openQrModal({ id, title: "QR de la visita", subtitle: "Guarda o comparte este QR." });
      return;
    }

    if(act === "marcarLlegada"){
      await marcarLlegada(id);
      return;
    }

    if(act === "autorizar"){
      const ok = await requirePin("autorizar la visita");
      if(!ok) return;
      await autorizarVisita(id);
      return;
    }

    if(act === "rechazar"){
      if(!confirm("¿Rechazar esta visita? Se desactivará el QR.")) return;
      const ok = await requirePin("rechazar la visita");
      if(!ok) return;
      await rechazarVisita(id);
      return;
    }

    if(act === "darAcceso"){
      const gafete = prompt("No. de gafete:");
      if(!gafete) return;
      await darAcceso(id, String(gafete).trim());
      return;
    }

    if(act === "darSalida"){
      const v = getVisibleVisitas(visitasHoy).find(x => x.id === id) || {};
      const inc = await askIncidenciaSalida({ nombre: v.nombreVisitante, id });
      if(inc === null) return;
      await darSalida(id, inc);
      return;
    }
  });

  // ---------- REALTIME HOY ----------
  function startListenerHoy(){
    stopListenerHoy();
    const { db, collection, query, where, orderBy, limit, onSnapshot } = window.__FB__;
    const { start, end } = dayBounds(new Date());

    const q = query(
      collection(db, "visitas"),
      where("createdTs", ">=", start),
      where("createdTs", "<", end),
      orderBy("createdTs", "desc"),
      limit(300)
    );

    unsubscribeHoy = onSnapshot(q, (snap) => {
      const arr = [];
      snap.forEach(d => arr.push({ id: d.id, ...d.data() }));
      visitasHoy = arr.filter(x => x.tipo === "visitante");

      if(view === VIEWS.DASH) renderDashboard();
      // En otras vistas no re-render para no molestar
    }, (err) => {
      console.error(err);
      toast("Realtime","No se pudo escuchar cambios (rules/conexión).", "bad", 4200);
      renderDashboard();
    });
  }

  function stopListenerHoy(){
    if(unsubscribeHoy){
      try{ unsubscribeHoy(); }catch{}
      unsubscribeHoy = null;
    }
  }

  // ---------- INIT: Auth observer ----------
  const waitFB = setInterval(() => {
    if(window.__FB__?.onAuthStateChanged){
      clearInterval(waitFB);
      const { auth, onAuthStateChanged, signOut } = window.__FB__;

      onAuthStateChanged(auth, async (user) => {
        currentUser = user || null;

        if(!currentUser){
          userProfile = null;
          userRole = null;
          stopScanner();
          stopListenerHoy();
          paintUser();
          return goTo(VIEWS.LOGIN);
        }

        try{
          userProfile = await loadUserProfile(currentUser.uid);
          if(!userProfile){
            toast("Acceso bloqueado","Tu cuenta no tiene rol asignado en /users.", "bad", 5200);
            await signOut(auth);
            return;
          }
          if(userProfile.activo === false){
            toast("Acceso bloqueado","Tu cuenta está desactivada.", "bad", 5200);
            await signOut(auth);
            return;
          }

          userRole = String(userProfile.rol || "").toLowerCase();
          if(userRole !== ROLES.ADMIN && userRole !== ROLES.GUARDIA && userRole !== ROLES.ANFITRION){
            toast("Acceso bloqueado","Rol inválido en /users.", "bad", 5200);
            await signOut(auth);
            return;
          }

          paintUser();
          toast("Sesión activa", "Bienvenido(a).", "ok", 1600);
          startListenerHoy();
          return goTo(VIEWS.DASH);

        }catch(e){
          console.error(e);
          toast("Error", "No se pudo validar tu perfil en /users.", "bad", 5200);
          await signOut(auth);
        }
      });
    }
  }, 50);

})();
</script>

      .catch(err => console.error("❌ SW error", err));
  });
}
