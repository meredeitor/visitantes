<script>
(() => {
  "use strict";

  const appEl = document.getElementById("app");
  const toasts = document.getElementById("toasts");
  const userPill = document.getElementById("userPill");
  const btnLogout = document.getElementById("btnLogout");

 const sidebarEl = document.getElementById("sidebar");
 const sbOverlay = document.getElementById("sbOverlay");
 const btnHamb = document.getElementById("btnHamb");
 const netDot = document.getElementById("netDot");
 const netText = document.getElementById("netText");

 function updateNet(){
   const on = navigator.onLine;
   if(netDot) netDot.className = "dot " + (on ? "ok" : "bad");
   if(netText) netText.textContent = on ? "En línea" : "Sin conexión";
 }

 function sbOpen(){
   if(!sidebarEl) return;
   sidebarEl.classList.add('open');
   if(sbOverlay) sbOverlay.classList.add('show');
 }
 function sbClose(){
   if(!sidebarEl) return;
   sidebarEl.classList.remove('open');
   if(sbOverlay) sbOverlay.classList.remove('show');
 }
 function sbToggle(){
   if(!sidebarEl) return;
   sidebarEl.classList.contains('open') ? sbClose() : sbOpen();
 }
 function setActiveSb(key){
   document.querySelectorAll('[data-sb]').forEach(el=>{
     if(el.dataset.sb === key) el.setAttribute('aria-current','page');
     else el.removeAttribute('aria-current');
   });
 }

 // Sidebar click routing
 document.addEventListener('click', (e)=>{
   const sb = e.target.closest('[data-sb]');
   if(!sb) return;
   const key = sb.dataset.sb;
   if(key === 'logout'){
     btnLogout?.click();
     sbClose();
     return;
   }
   // Seguridad por rol
   if(String(userRole||'').toLowerCase() === ROLES.ANFITRION){
     // Anfitrión: solo dashboard y (si aplica) autorización en tarjetas; sin escáner/alta/usuarios/nueva cita
     if(['scan','alta','usuarios'].includes(key)){
       toast('Acceso denegado','Tu rol no permite esa sección.', 'bad', 2800);
       return;
     }
   }
   if(key === 'dash'){ setActiveSb('dash'); sbClose(); goTo(VIEWS.DASH); return; }
   if(key === 'scan'){ setActiveSb('scan'); sbClose(); goTo(VIEWS.SCAN); return; }
   if(key === 'cita'){ setActiveSb('cita'); sbClose(); goTo(VIEWS.CITA); return; }
   if(key === 'visitantes'){ setActiveSb('visitantes'); sbClose(); goTo(VIEWS.VIS); return; }
   if(key === 'alta'){ setActiveSb('alta'); sbClose(); goTo(VIEWS.ALTA); return; }
   if(key === 'usuarios'){ setActiveSb('usuarios'); sbClose(); goTo(VIEWS.USERS); return; }
   if(key === 'kpi'){ setActiveSb('kpi'); sbClose(); goTo(VIEWS.KPI); return; }
   if(key === 'historial'){ setActiveSb('historial'); sbClose(); goTo(VIEWS.HIST); return;}
  });

 if(btnHamb){ btnHamb.addEventListener('click', (e)=>{ e.preventDefault(); sbToggle(); }); }
 if(sbOverlay){ sbOverlay.addEventListener('click', sbClose); }
 window.addEventListener('online', updateNet);
 window.addEventListener('offline', updateNet);
 updateNet();


  const ROLES = { ADMIN:"admin", GUARDIA:"guardia", ANFITRION:"anfitrion" };

  const Status = {
    PROGRAMADO: "programado",
    AUTORIZACION: "autorizacion",
    RECHAZADO: "rechazado",
    LLEGADO: "llegado",
    DENTRO: "dentro",
    FINALIZADO: "finalizado"
  };

  const WAIT_GREEN_MAX = 5;
  const WAIT_YELLOW_MAX = 15;

  const VIEWS = {
  LOGIN: "login",
  DASH: "dash",
  SCAN: "scan",
  ALTA: "alta",
  VIS: "visitantes",
  CITA: "cita",
  USERS: "usuarios",
  KPI: "kpi",
  HIST: "historial" 
};


  let view = VIEWS.LOGIN;
  let currentUser = null;
  let userProfile = null;
  let userRole = null;
  let unsubscribeHoy = null;
  let visitasHoy = [];
  let scanner = null;

  const $ = (sel, root=document) => root.querySelector(sel);
  const esc = (s="") => String(s ?? "").replace(/[&<>"']/g, ch => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[ch] || ch));

  function toast(title, msg, type="info", ttl=2600){
    const badgeColor =
      type==="ok" ? "#16a34a" :
      type==="warn" ? "#d97706" :
      type==="bad" ? "#dc2626" : "#0284c7";
    const el = document.createElement("div");
    el.className = "toast";
    el.innerHTML = `
      <span class="badge" style="background:${badgeColor}"></span>
      <div><b>${esc(title)}</b><p>${esc(msg)}</p></div>
    `;
    toasts.appendChild(el);
    setTimeout(() => el.remove(), ttl);
  }

  function goTo(next){
    view = next;
    if(view === VIEWS.LOGIN) return renderLogin();
    if(view === VIEWS.DASH) return renderDashboard();
    if(view === VIEWS.SCAN) return renderScanner();
    if(view === VIEWS.ALTA) return renderAltaUsuario();
    if(view === VIEWS.VIS) return renderVisitantes();
    if(view === VIEWS.CITA) return renderNuevaCita();
    if(view === VIEWS.USERS) return renderUsuarios();
    if(view === VIEWS.KPI) return renderKPI();
    if(view === VIEWS.HIST) return renderHistorial();
  }

  function dayBounds(d=new Date()){
    const x = new Date(d);
    x.setHours(0,0,0,0);
    return { start: x.getTime(), end: x.getTime() + 24*60*60*1000 };
  }
  function mins(ms){ return Math.max(0, Math.round(ms / 60000)); }

  function calcTimes(v){
    const now = Date.now();
    const llegada = v.llegadaTs ?? null;
    const entrada = v.entradaTs ?? null;
    const salida  = v.salidaTs  ?? null;

    const esperaMin =
      (entrada && llegada) ? mins(entrada - llegada) :
      (v.status === Status.LLEGADO && llegada) ? mins(now - llegada) : null;

    const dentroMin = (salida && entrada) ? mins(salida - entrada) : null;
    const totalMin  = (salida && llegada) ? mins(salida - llegada) : null;
    return { esperaMin, dentroMin, totalMin };
  }

  function waitRag(esperaMin){
    if(esperaMin == null) return null;
    if(esperaMin <= WAIT_GREEN_MAX) return { dot:"ok", label:"VERDE" };
    if(esperaMin <= WAIT_YELLOW_MAX) return { dot:"warn", label:"AMARILLO" };
    return { dot:"bad", label:"ROJO" };
  }

  function waitChip(esperaMin){
    const r = waitRag(esperaMin);
    if(!r) return "";
    const bg = r.dot === "ok" ? "rgba(22,163,74,.12)" : r.dot === "warn" ? "rgba(217,119,6,.14)" : "rgba(220,38,38,.14)";
    const br = r.dot === "ok" ? "rgba(22,163,74,.45)" : r.dot === "warn" ? "rgba(217,119,6,.45)" : "rgba(220,38,38,.45)";
    return `<span class="pill" title="Semáforo de espera (Llegado→Dentro)" style="background:${bg}; border-color:${br};">
      <span class="dot ${r.dot}"></span>
      Espera: <b style="color:#0f172a">${esperaMin} min</b> · ${r.label}
    </span>`;
  }

  function statusPill(v){
    if(v.status === Status.PROGRAMADO) return `<span class="pill"><span class="dot info"></span>PROGRAMADO</span>`;
    if(v.status === Status.AUTORIZACION) return `<span class="pill"><span class="dot warn"></span>PEND. AUTORIZACIÓN</span>`;
    if(v.status === Status.RECHAZADO) return `<span class="pill"><span class="dot bad"></span>RECHAZADO</span>`;
    if(v.status === Status.LLEGADO) return `<span class="pill"><span class="dot warn"></span>LLEGÓ</span>`;
    if(v.status === Status.DENTRO) return `<span class="pill"><span class="dot ok"></span>DENTRO</span>`;
    return `<span class="pill"><span class="dot muted"></span>FINALIZADO</span>`;
  }

  function qrPill(v){
    return v.qrActivo
      ? `<span class="pill"><span class="dot ok"></span>QR Activo</span>`
      : `<span class="pill"><span class="dot bad"></span>QR Inactivo</span>`;
  }

  function citaChip(v){
    if(v.status !== Status.PROGRAMADO) return "";
    const f = v.fechaProgramada || "";
    const h = v.horaProgramada || "";
    if(!f && !h) return `<span class="pill"><span class="dot info"></span>Cita programada</span>`;
    return `<span class="pill"><span class="dot info"></span>Cita: <b style="color:#0f172a">${esc(f)} ${esc(h)}</b></span>`;
  }

  // ====== FILTRO: Anfitrión solo ve sus visitantes ======
  function norm(s){
    return String(s ?? "").trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
  }
  
  
  function getVisibleVisitas(list){
  return list || [];
}

  function askPin({ title = "Validación requerida", subtitle = "Ingresa tu PIN para continuar" } = {}){
    return new Promise((resolve) => {
      const back = document.createElement("div");
      back.className = "modal-backdrop";
      back.innerHTML = `
        <div class="modal">
          <h3>${esc(title)}</h3>
          <p class="muted">${esc(subtitle)}</p>

        </div>
      `;
      document.body.appendChild(back);
      const close = () => { try{ back.remove(); }catch{} };
      back.addEventListener("click", (e) => { if(e.target === back){ close(); resolve(null); } });
      const pinEl = back.querySelector("#pinTxt");
      const ok = () => {
        const val = (pinEl.value || "").trim();
        close();
        resolve(val || null);
      };
      back.querySelector("#btnCancelPin").onclick = () => { close(); resolve(null); };
      back.querySelector("#btnOkPin").onclick = ok;
      pinEl.addEventListener("keydown", (ev) => {
        if(ev.key === "Enter") ok();

    });
  }

  async function requirePin(actionLabel = "continuar"){
    const expected = String(userProfile?.pinAutorizacion || "").trim();
    if(!expected){
      toast("PIN no configurado", "Tu usuario no tiene pinAutorizacion en /users.", "warn", 4200);
      return false;
    }
    const pin = await askPin({ subtitle: `Ingresa tu PIN para ${actionLabel}.` });
    if(pin === null) return false;
    if(String(pin).trim() !== expected){

    return true;

  function openQrModal({ id, title="QR de visitante", subtitle="" }){
    return new Promise((resolve) => {
      const back = document.createElement("div");
      back.className = "modal-backdrop";
      back.innerHTML = `
        <div class="modal">
          <h3>${esc(title)}</h3>

            <button class="secondary" id="btnCompartirQR">Compartir QR</button>
          </div>
          <div class="muted" style="margin-top:10px;">Este QR identifica la visita. Para acceso debe estar en <b>LLEGADO</b>.</div>
        </div>
      `;
      document.body.appendChild(back);
      const close = () => { try{ back.remove(); }catch{} resolve(); };
      back.addEventListener("click", (e) => { if(e.target === back) close(); });
      back.querySelector("#btnCerrarQR").onclick = close;

      const qrBox = back.querySelector("#qrBox");
      qrBox.innerHTML = "";
      if(!window.QRCode){
        toast("QR", "No cargó QRCode.js (revisa el script CDN).", "bad", 4200);
        return close();
      }
      new QRCode(qrBox, { text: id, width: 220, height: 220 });

      const canvas = qrBox.querySelector("canvas");
      const qrDataUrl = canvas?.toDataURL?.("image/png");

      back.querySelector("#btnGuardarQR").onclick = () => {
        if(!qrDataUrl) return toast("QR", "No se pudo generar el QR.", "bad", 3000);
        const a = document.createElement("a");
        a.href = qrDataUrl;
        a.download = `QR-${id}.png`;
        a.click();
      };

      back.querySelector("#btnCompartirQR").onclick = async () => {
        if(!qrDataUrl || !navigator.share){
          toast("Compartir", "Tu dispositivo no soporta compartir. Usa Guardar o captura.", "warn", 3500);
          return;
        }
        try{
          const blob = await (await fetch(qrDataUrl)).blob();
          const file = new File([blob], `QR-${id}.png`, { type: "image/png" });
          await navigator.share({ title: "QR de Visitante", text: `QR para la visita (${id})`, files: [file] });
        }catch(e){
          console.error(e);
          toast("Compartir", "No se pudo compartir el QR.", "bad", 3500);
        }
      };
    });
  }

 function renderDashboard(){

function renderKPI(){

  // Base del día (lo que ya trae tu listener del día)

    rechazados: base.filter(v => v.status === Status.RECHAZADO).length,
    total: base.length
  };

  // Tiempos (min)
  const waits = base
    .filter(v => v.llegadaTs && v.entradaTs && v.entradaTs >= v.llegadaTs)
    .map(v => Math.round((v.entradaTs - v.llegadaTs) / 60000));

  const avg = arr => arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : 0;
  const esperaProm = avg(waits);

  // Semáforo (usa tus límites WAIT_GREEN_MAX / WAIT_YELLOW_MAX)
  const verde = waits.filter(m => m <= WAIT_GREEN_MAX).length;
  const amarillo = waits.filter(m => m > WAIT_GREEN_MAX && m <= WAIT_YELLOW_MAX).length;
  const rojo = waits.filter(m => m > WAIT_YELLOW_MAX).length;

  // Cumplimiento simple
  const cumplimiento = k.programados ? Math.round((k.finalizados / k.programados) * 100) : 0;

  const hours = Array.from({length: 24}, (_,i)=> String(i).padStart(2,"0")+":00");
  const byHour = new Array(24).fill(0);
  base.forEach(v=>{
    if(!v.programadaTs) return;

        <div class="kpi-metric"><span>Espera promedio (min)</span><b>${esperaProm}</b></div>
        <div class="kpi-metric"><span>Pend. Autorización</span><b>${k.autorizacion}</b></div>
      </div>

      <div style="height:12px"></div>

      <!-- Gráficas -->
      <div class="kpi-grid">
        <div class="card chart-card">
          <div class="colTitle">Estatus del día</div>
          <div class="chart-wrap">
            <canvas id="chStatus"></canvas>
          </div>
        </div>

        <div class="card chart-card">
          <div class="colTitle">Semáforo de espera (Llegado→Dentro)</div>
          <div class="chart-wrap sm">
            <canvas id="chRag"></canvas>
          </div>
          <div class="muted" style="margin-top:8px;">

          </div>
        </div>
      </div>

      <div style="height:12px"></div>

      <div class="card chart-card">
        <div class="colTitle">Tendencia por hora (citas programadas)</div>
        <div class="chart-wrap">
          <canvas id="chHour"></canvas>
        </div>
      </div>

      <div class="divider"></div>

      <div class="card">
        <div class="colTitle">Detalle del día</div>
        <div style="overflow:auto;">
          <table class="table">
            <thead>
              <tr>
                <th>Hora</th>
                <th>Visitante</th>
                <th>Empresa</th>
                <th>Visita a</th>
                <th>Estatus</th>
                <th>Espera (min)</th>
              </tr>
            </thead>
            <tbody>
              ${base.map(v => {
                const hora = v.horaProgramada || (v.programadaTs ? new Date(v.programadaTs).toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}) : '-');
                const espera = (v.llegadaTs && v.entradaTs) ? Math.round((v.entradaTs - v.llegadaTs)/60000) : '';
                return `
                  <tr>
                    <td>${esc(hora)}</td>

async function cargarHistorialPorDia(fechaISO){
  const { db, collection, query, where, orderBy, getDocs, limit } = window.__FB__;

  const start = new Date(fechaISO + "T00:00:00").getTime();
  const end   = new Date(fechaISO + "T23:59:59").getTime();

  const q = query(
    collection(db, "visitas"),
    where("programadaTs", ">=", start),
    where("programadaTs", "<=", end),
    orderBy("programadaTs", "asc"),
    limit(2000)
  );

  const snap = await getDocs(q);
  const list = [];
  snap.forEach(d => list.push({ id: d.id, ...d.data() }));

  // Solo visitantes (igual que haces en dashboard/tabla)
  return list.filter(v => v.tipo === "visitante");
}

async function loadHistorial(){
  const fecha = document.getElementById("histFecha")?.value;
  const kpiEl = document.getElementById("histKPIs");
  const tabEl = document.getElementById("histTabla");

  if(!fecha || !kpiEl || !tabEl){
    toast("Historial","No se encontró la fecha o contenedores del historial.","bad",3500);
    return;
  }

  // UI loading
  kpiEl.innerHTML = `<span class="pill"><span class="dot info"></span>Cargando KPIs…</span>`;
  tabEl.innerHTML = `<div class="muted">Cargando registros…</div>`;

  try{
    const list = await cargarHistorialPorDia(fecha);

    // ===== KPIs =====
    const total = list.length;
    const programados  = list.filter(v => v.status === Status.PROGRAMADO).length;
    const autorizacion = list.filter(v => v.status === Status.AUTORIZACION).length;
    const llegados     = list.filter(v => v.status === Status.LLEGADO).length;
    const dentro       = list.filter(v => v.status === Status.DENTRO).length;
    const finalizados  = list.filter(v => v.status === Status.FINALIZADO).length;
    const rechazados   = list.filter(v => v.status === Status.RECHAZADO).length;

    // Espera promedio (Llegado → Dentro)
    const waits = list
      .map(v => calcTimes(v).esperaMin)
      .filter(x => x !== null);

    const avg = arr => arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : 0;
    const esperaProm = avg(waits);

    // Semáforo (usa tus límites existentes)
    const verde    = waits.filter(m => m <= WAIT_GREEN_MAX).length;
    const amarillo = waits.filter(m => m > WAIT_GREEN_MAX && m <= WAIT_YELLOW_MAX).length;
    const rojo     = waits.filter(m => m > WAIT_YELLOW_MAX).length;

    kpiEl.innerHTML = `
      <div class="row" style="gap:8px; flex-wrap:wrap;">
        <span class="pill"><span class="dot brand"></span>Total: <b style="color:#0f172a;margin-left:6px;">${total}</b></span>
        <span class="pill"><span class="dot info"></span>Programados: <b style="color:#0f172a;margin-left:6px;">${programados}</b></span>
        <span class="pill"><span class="dot warn"></span>Autorización: <b style="color:#0f172a;margin-left:6px;">${autorizacion}</b></span>
        <span class="pill"><span class="dot warn"></span>Llegados: <b style="color:#0f172a;margin-left:6px;">${llegados}</b></span>
        <span class="pill"><span class="dot ok"></span>Dentro: <b style="color:#0f172a;margin-left:6px;">${dentro}</b></span>
        <span class="pill"><span class="dot muted"></span>Finalizados: <b style="color:#0f172a;margin-left:6px;">${finalizados}</b></span>
        <span class="pill"><span class="dot bad"></span>Rechazados: <b style="color:#0f172a;margin-left:6px;">${rechazados}</b></span>
        <span class="pill" title="Llegado→Dentro"><span class="dot brand"></span>Espera prom: <b style="color:#0f172a;margin-left:6px;">${esperaProm} min</b></span>
        <span class="pill" title="Semáforo de espera"><span class="dot ok"></span>${verde}</span>
        <span class="pill" title="Semáforo de espera"><span class="dot warn"></span>${amarillo}</span>
        <span class="pill" title="Semáforo de espera"><span class="dot bad"></span>${rojo}</span>
      </div>
    `;

    // ===== Tabla =====
    if(!list.length){
      tabEl.innerHTML = `<div class="muted">No hay registros para ese día.</div>`;
      return;
    }

    const badge = (s) => {
      if(s === Status.PROGRAMADO) return `<span class="pill"><span class="dot info"></span>PROGRAMADO</span>`;
      if(s === Status.AUTORIZACION) return `<span class="pill"><span class="dot warn"></span>AUTORIZACIÓN</span>`;
      if(s === Status.LLEGADO) return `<span class="pill"><span class="dot warn"></span>LLEGADO</span>`;
      if(s === Status.DENTRO) return `<span class="pill"><span class="dot ok"></span>DENTRO</span>`;
      if(s === Status.FINALIZADO) return `<span class="pill"><span class="dot muted"></span>FINALIZADO</span>`;
      if(s === Status.RECHAZADO) return `<span class="pill"><span class="dot bad"></span>RECHAZADO</span>`;
      return `<span class="pill">${esc(s || "-")}</span>`;
    };

    tabEl.innerHTML = `
      <table class="table">
        <thead>
          <tr>
            <th>Hora</th>
            <th>Visitante</th>
            <th>Empresa</th>
            <th>Visita a</th>
            <th>Estatus</th>
            <th>Espera (min)</th>
            <th>Ver QR</th>
          </tr>
        </thead>
        <tbody>
          ${list.map(v => {
            const hora = v.horaProgramada
              || (v.programadaTs ? new Date(v.programadaTs).toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}) : '-');

            const espera = (v.llegadaTs && v.entradaTs)
              ? Math.round((v.entradaTs - v.llegadaTs)/60000)
              : "";

            return `
              <tr data-act="verDetalleCita" data-id="${esc(v.id)}">
                <td>${esc(hora)}</td>
                <td><b>${esc(v.nombreVisitante || "-")}</b><br><code>${esc(v.id)}</code></td>
                <td>${esc(v.empresa || "-")}</td>
                <td>${esc(v.personaVisita || "-")}</td>
                <td>${badge(v.status)}</td>
                <td>${esc(espera)}</td>         
                <td>${v.qrActivo
                  ? `<button class="secondary"
                  data-act="verQR"
                  data-id="${esc(v.id)}">
                  Ver QR
               </button>`
            : `<span class="muted">N/A</span>`
          }
        </td>

              </tr>
            `;
          }).join("")}
        </tbody>
      </table>
      <div class="muted" style="margin-top:8px;">
        Tip: puedes dar click en una fila para ver el detalle de la cita.
      </div>
    `;

  }catch(e){
    console.error(e);
    kpiEl.innerHTML = `<span class="pill"><span class="dot bad"></span>Error</span>`;
    tabEl.innerHTML = `<div class="muted">No se pudo cargar el historial (Rules/Internet).</div>`;
    toast("Historial","No se pudo cargar. Revisa conexión y Rules.","bad",4200);
  }
}

  function renderVisitCard(v){

      chips.push(waitChip(t.esperaMin));
    }
    if(t.dentroMin !== null) chips.push(`<span class="pill"><span class="dot brand"></span>Dentro: <b style="color:#0f172a">${t.dentroMin} min</b></span>`);
    if(t.totalMin !== null) chips.push(`<span class="pill"><span class="dot muted"></span>Total: <b style="color:#0f172a">${t.totalMin} min</b></span>`);
    if(v.gafeteNo) chips.push(`<span class="pill"><span class="dot info"></span>Gafete: <b style="color:#0f172a">${esc(v.gafeteNo)}</b></span>`);
    if(v.incidenciasSalida) chips.push(`<span class="pill"><span class="dot warn"></span>Incidencia</span>`);

    const cc = citaChip(v);
    if(cc) chips.push(cc);

    const acciones = [];

    // PROGRAMADO: ver QR + marcar llegada (no anfitrión)
    if(v.status === Status.PROGRAMADO && v.qrActivo){
      acciones.push(`<button class="secondary" data-act="verQR" data-id="${esc(v.id)}">Ver QR</button>`);
      if(userRole !== ROLES.ANFITRION){
        acciones.push(`<button class="ok" data-act="marcarLlegada" data-id="${esc(v.id)}">Marcar llegada</button>`);
      }
    }

    // AUTORIZACION: solo admin + anfitrión (con PIN en handler)
    if(v.status === Status.AUTORIZACION && v.qrActivo){
      if(userRole === ROLES.ADMIN || userRole === ROLES.ANFITRION){
        acciones.push(`<button class="ok" data-act="autorizar" data-id="${esc(v.id)}">Autorizar</button>`);
        acciones.push(`<button class="danger" data-act="rechazar" data-id="${esc(v.id)}">Rechazar</button>`);

    }

    // LLEGADO/DENTRO: solo guardia o admin
    if(v.status === Status.LLEGADO && v.qrActivo && userRole !== ROLES.ANFITRION){
      acciones.push(`<button class="ok" data-act="darAcceso" data-id="${esc(v.id)}">Dar acceso</button>`);

    if(v.status === Status.DENTRO && v.qrActivo && userRole !== ROLES.ANFITRION){
      acciones.push(`<button class="danger" data-act="darSalida" data-id="${esc(v.id)}">Dar salida</button>`);
    }

    let ragClass = "";
    if(v.status === Status.LLEGADO){
      const w = calcTimes(v).esperaMin;
      const r = waitRag(w);
      if(r?.dot === "ok") ragClass = "rag-ok";
      else if(r?.dot === "warn") ragClass = "rag-warn";
      else if(r?.dot === "bad") ragClass = "rag-bad";
    }

    return `
      <div class="visitCard ${ragClass}"
     data-act="verDetalleCita" 
     data-id="${esc(v.id)}">
        <div class="row" style="justify-content:space-between;">
          <div>
            <b>${esc(v.nombreVisitante || "-")}</b>
            <div class="muted">${esc(v.empresa || "")} · Visita a: <b>${esc(v.personaVisita || "-")}</b></div>
            <div class="muted">ID: <b>${esc(v.id)}</b></div>
            <div class="meta">
              ${statusPill(v)}
              ${qrPill(v)}
              ${chips.join("")}
            </div>
          </div>
          <div class="row" style="justify-content:flex-end;">
            ${acciones.join("")}
          </div>
        </div>
      </div>
    `;
  }

  async function crearUsuarioDesdeAdmin(){
    const nombre = ($("#uNombre").value || "").trim();
    const email  = ($("#uEmail").value  || "").trim();
    const pass   = ($("#uPass").value   || "").trim();
    const rol    = ($("#uRol").value    || "").trim();
    const pin    = ($("#uPin").value    || "").trim();
    const msg = $("#uMsg");
    msg.textContent = "";

    if(!nombre || !email || !pass){
      msg.textContent = "Completa nombre, correo y contraseña.";
      return;
    }

    try{
      const { auth2, createUserWithEmailAndPassword, signOut, db, doc, setDoc } = window.__FB__;
      const cred = await createUserWithEmailAndPassword(auth2, email, pass);
      const uid = cred.user.uid;

      await setDoc(doc(db, "users", uid), {
        uid,
        nombre,
        email,
        rol,
        activo: true,
        createdTs: Date.now(),
        pinAutorizacion: pin || ""
      });

      try{ await signOut(auth2); }catch{}

      msg.textContent = "✅ Usuario creado, rol y PIN guardados.";
      toast("Alta usuario","Usuario creado correctamente.", "ok", 2200);

      $("#uNombre").value = "";
      $("#uEmail").value = "";
      $("#uPass").value = "";
      $("#uRol").value = ROLES.GUARDIA;
      $("#uPin").value = "";
      $("#uNombre").focus();
    }catch(e){
      console.error(e);
      msg.textContent = e?.message || "Error al crear usuario.";
      toast("Error", msg.textContent, "bad", 4200);
    }
  }

  async function fetchVisitantesByDay(dateISO){
    const { db, collection, query, where, getDocs, limit } = window.__FB__;
    const start = new Date(dateISO + "T00:00:00").getTime();
    const end = new Date(dateISO + "T23:59:59").getTime();

    const q = query(
      collection(db, "visitas"),
      where("tipo", "==", "visitante"),
      where("createdTs", ">=", start),
      where("createdTs", "<=", end),
      limit(800)
    );

    const snap = await getDocs(q);
    const arr = [];
    snap.forEach(d => arr.push({ id: d.id, ...d.data() }));
    arr.sort((a,b) => (b.llegadaTs || b.createdTs || 0) - (a.llegadaTs || a.createdTs || 0));

    return getVisibleVisitas(arr);
  }

  async function loadVisitantes(){
    const fecha = document.getElementById('visFecha')?.value;
    const status = (document.getElementById('visStatus')?.value || '').trim();
    const term = (document.getElementById('visSearch')?.value || '').trim().toLowerCase();
    const resEl = document.getElementById('visResumen');
    const tabEl = document.getElementById('visTabla');
    if(!fecha || !resEl || !tabEl) return;

    resEl.innerHTML = `<span class="pill"><span class="dot info"></span>Cargando…</span>`;
    tabEl.innerHTML = '';

    try{
      const hoyISO = new Date().toISOString().slice(0,10);
      let list = [];
      if(fecha === hoyISO){
        list = getVisibleVisitas(visitasHoy).filter(x => x.tipo === 'visitante');
        list.sort((a,b) => (b.llegadaTs || b.createdTs || 0) - (a.llegadaTs || a.createdTs || 0));
      }else{
        list = await fetchVisitantesByDay(fecha);
      }

      if(status) list = list.filter(v => (v.status || '') === status);

      if(term){
        list = list.filter(v =>
          String(v.id || '').toLowerCase().includes(term) ||
          String(v.nombreVisitante || '').toLowerCase().includes(term) ||
          String(v.empresa || '').toLowerCase().includes(term) ||
          String(v.personaVisita || '').toLowerCase().includes(term) ||
          String(v.motivoVisita || '').toLowerCase().includes(term)
        );
      }

      const total = list.length;
      const cProg = list.filter(v => v.status === Status.PROGRAMADO).length;
      const cAut  = list.filter(v => v.status === Status.AUTORIZACION).length;
      const cLleg = list.filter(v => v.status === Status.LLEGADO).length;
      const cDen  = list.filter(v => v.status === Status.DENTRO).length;
      const cFin  = list.filter(v => v.status === Status.FINALIZADO).length;
      const cRech = list.filter(v => v.status === Status.RECHAZADO).length;

      resEl.innerHTML = `
        <span class="pill"><span class="dot brand"></span>Total: <b style="color:#0f172a; margin-left:6px;">${total}</b></span>
        <span class="pill"><span class="dot info"></span>Programados: <b style="color:#0f172a; margin-left:6px;">${cProg}</b></span>

      `;

      if(!list.length){
        tabEl.innerHTML = `<div class="muted">Sin registros con esos filtros.</div>`;
        return;
      }

      const badge = (s) => {
        if(s === Status.PROGRAMADO) return `<span class="pill"><span class="dot info"></span>PROGRAMADO</span>`;
        if(s === Status.AUTORIZACION) return `<span class="pill"><span class="dot warn"></span>AUTORIZACIÓN</span>`;
        if(s === Status.LLEGADO) return `<span class="pill"><span class="dot warn"></span>LLEGADO</span>`;
        if(s === Status.DENTRO) return `<span class="pill"><span class="dot ok"></span>DENTRO</span>`;
        if(s === Status.FINALIZADO) return `<span class="pill"><span class="dot muted"></span>FINALIZADO</span>`;
        if(s === Status.RECHAZADO) return `<span class="pill"><span class="dot bad"></span>RECHAZADO</span>`;
        return `<span class="pill">${esc(s || '-')}</span>`;
      };

      tabEl.innerHTML = `
        <table class="table">
          <thead>
            <tr>
              <th>Hora</th>

              <th>Empresa</th>
              <th>Motivo</th>

              <th>Estatus</th>

            ${list.map(v => {
              const hora = v.llegadaTs ? new Date(v.llegadaTs).toLocaleTimeString() : (v.horaProgramada || '-');

      tabEl.innerHTML = `<div class="muted">Error cargando visitantes (Rules/Internet).</div>`;

  async function handleScan(id){
    if(!id){
      toast("QR","Código vacío.", "warn");
      return goTo(VIEWS.DASH);
    }

    const { db, doc, getDoc } = window.__FB__;
    let snap;
    try{
      snap = await getDoc(doc(db, "visitas", id));
    }catch(e){
      console.error(e);
      toast("Firestore","No se pudo consultar (conexión/rules).", "bad", 4200);
      return goTo(VIEWS.DASH);
    }

    if(!snap.exists()){
      toast("QR inválido","No existe ese ID en la base.", "bad", 3200);
      return goTo(VIEWS.DASH);
    }

    const v = { id: snap.id, ...snap.data() };

    if(v.tipo !== "visitante"){
      toast("No permitido","Este QR no es de visitantes.", "warn", 3200);
      return goTo(VIEWS.DASH);
    }

    if(!v.qrActivo){
      toast("QR inactivo","Ya fue desactivado al finalizar/rechazar.", "warn", 3200);
      return goTo(VIEWS.DASH);
    }

    // Bloqueos por estatus
    if(v.status === Status.PROGRAMADO){
      toast("Cita programada","Primero marca llegada (PROGRAMADO → LLEGADO).", "warn", 3600);
      return goTo(VIEWS.DASH);
    }
    if(v.status === Status.AUTORIZACION){
      toast("Pendiente","Aún no está autorizada.", "warn", 3200);
      return goTo(VIEWS.DASH);
    }
    if(v.status === Status.RECHAZADO){
      toast("Rechazado","Esta visita fue rechazada.", "bad", 3200);
      return goTo(VIEWS.DASH);
    }

    if(v.status === Status.LLEGADO){
      const gafete = prompt("No. de gafete:");
      if(!gafete) return goTo(VIEWS.DASH);
      await darAcceso(v.id, String(gafete).trim());
      return;
    }

    if(v.status === Status.DENTRO){
      const inc = await askIncidenciaSalida({ nombre: v.nombreVisitante, id: v.id });
      if(inc === null) return goTo(VIEWS.DASH);
      await darSalida(v.id, inc);
      return;
    }

    toast("Sin acción","Este registro ya está finalizado.", "info", 2400);
    return goTo(VIEWS.DASH);
  }

        autorizadoPor: userProfile?.nombre || currentUser?.email || "",
        updatedTs: Date.now()
      });
      toast("Rechazado","Se desactivó el QR.", "ok", 2400);
      goTo(VIEWS.DASH);
    }catch(e){
      console.error(e);
      toast("Error","No se pudo rechazar.", "bad", 4200);
      goTo(VIEWS.DASH);
    }
  }

  function openEditarUsuario(u){
  const back = document.createElement("div");
  back.className = "modal-backdrop";
  back.innerHTML = `
  <div class="modal">
    <h3>Editar usuario</h3>
    <p class="muted">${esc(u.email)}</p>

    <label>Nombre</label>
    <input id="euNombre" value="${esc(u.nombre || '')}"/>

    <label>Rol</label>
    <select id="euRol">
      <option value="admin" ${u.rol === 'admin' ? 'selected':''}>Admin</option>
      <option value="guardia" ${u.rol === 'guardia' ? 'selected':''}>Guardia</option>
      <option value="anfitrion" ${u.rol === 'anfitrion' ? 'selected':''}>Anfitrión</option>
    </select>

    <label>PIN autorización</label>
    <input id="euPin" type="password" value="${esc(u.pinAutorizacion || '')}"/>

    <label>Activo</label>
    <select id="euActivo">
      <option value="true" ${u.activo !== false ? 'selected':''}>Sí</option>
      <option value="false" ${u.activo === false ? 'selected':''}>No</option>
    </select>

    <div style="height:12px"></div>

    <div class="row" style="justify-content:flex-end;">
      <button class="secondary" id="btnCancelEdit">Cancelar</button>
      <button class="ok" id="btnSaveEdit">Guardar</button>
    </div>
  </div>
  `;
  document.body.appendChild(back);

  const close = () => back.remove();

  back.querySelector("#btnCancelEdit").onclick = close;

  back.querySelector("#btnSaveEdit").onclick = async () => {
    const data = {
      nombre: back.querySelector("#euNombre").value.trim(),
      rol: back.querySelector("#euRol").value,
      pinAutorizacion: back.querySelector("#euPin").value.trim(),
      activo: back.querySelector("#euActivo").value === "true",
      updatedTs: Date.now()
    };
    await actualizarUsuario(u.uid, data);
    close();
  };
}

async function actualizarUsuario(uid, data){
  const { db, doc, updateDoc } = window.__FB__;
  try{
    await updateDoc(doc(db, "users", uid), data);
    toast("Usuario actualizado","Cambios guardados.","ok",2200);
    loadUsuarios();
  }catch(e){
    console.error(e);
    toast("Error","No se pudo actualizar el usuario.","bad",4200);
  }
}

  // Click actions
 // ===============================
// Click actions (GLOBAL)
// ===============================
document.addEventListener("click", async (e) => {
  const btn = e.target.closest("[data-act]");
  if (!btn) return;

  const act = btn.dataset.act;
  const id  = btn.dataset.id;

  // ===============================
  // Navegación básica
  // ===============================
  if (act === "visitantes") return goTo(VIEWS.VIS);
  if (act === "usuarios") return goTo(VIEWS.USERS);
  if (act === "kpi") return goTo(VIEWS.KPI);
  if (act === "historial") return goTo(VIEWS.HIST);

  if (act === "volverUsuarios") return goTo(VIEWS.DASH);
  if (act === "volverKPI") return goTo(VIEWS.DASH);
  if (act === "volverHistorial") return goTo(VIEWS.DASH);

  // ===============================
  // HISTORIAL
  // ===============================
  if (act === "cargarHistorial") {
    await loadHistorial();
    return;
  }

  // ===============================
  // USUARIOS (Admin)
  // ===============================
  if (act === "editarUsuario") {
    const uid = btn.dataset.id;
    const u = usuariosCache.find(x => x.uid === uid);
    if (!u) {
      toast("Error", "No se encontró el usuario.", "bad", 3000);
      return;
    }
    openEditarUsuario(u);
    return;
  }

  // ===============================
  // DASHBOARD / Citas
  // ===============================
  if (act === "verDetalleCita") {
    const v =
      visitasHoy.find(x => x.id === id) ||
      null;

    if (!v) {
      toast("Detalle", "No se encontró la cita.", "warn", 3000);
      return;
    }
    openDetalleCitaModal(v);
    return;
  }

  if (act === "verQR") {
    await openQrModal({
      id,
      title: "QR de la visita",
      subtitle: "Guarda o comparte este QR."
    });
    return;
  }

  if (act === "marcarLlegada") {
    await marcarLlegada(id);
    return;
  }

  if (act === "autorizar") {
    const ok = await requirePin("autorizar la visita");
    if (!ok) return;
    await autorizarVisita(id);
    return;
  }

  if (act === "rechazar") {
    if (!confirm("¿Rechazar esta visita? Se desactivará el QR.")) return;
    const ok = await requirePin("rechazar la visita");
    if (!ok) return;
    await rechazarVisita(id);
    return;
  }

  if (act === "darAcceso") {
    const gafete = prompt("No. de gafete:");
    if (!gafete) return;
    await darAcceso(id, String(gafete).trim());
    return;
  }

  if (act === "darSalida") {
    const v = visitasHoy.find(x => x.id === id) || {};
    const inc = await askIncidenciaSalida({
      nombre: v.nombreVisitante,
      id
    });
    if (inc === null) return;
    await darSalida(id, inc);
    return;
  }
});
  
// ---------- REALTIME HOY ----------
function startListenerHoy(){
  stopListenerHoy();

  const { db, collection, query, where, orderBy, limit, onSnapshot } = window.__FB__;

  // ✅ Límites del día de HOY
  const hoyInicio = new Date();
  hoyInicio.setHours(0, 0, 0, 0);

  const hoyFin = new Date(hoyInicio.getTime() + 24 * 60 * 60 * 1000);

  // ✅ QUERY POR FECHA PROGRAMADA (NO POR FECHA DE CREACIÓN)
  const q = query(
    collection(db, "visitas"),
    where("programadaTs", ">=", hoyInicio.getTime()),
    where("programadaTs", "<", hoyFin.getTime()),
    orderBy("programadaTs", "asc"),
    limit(300)
  );

  unsubscribeHoy = onSnapshot(
    q,
    (snap) => {
      const arr = [];

      snap.forEach(d => {
        arr.push({ id: d.id, ...d.data() });
      });

      // ✅ Solo tipo visitante
      visitasHoy = arr.filter(v => v.tipo === "visitante");

      console.log(
        "VISITAS DEL DASHBOARD:",
        visitasHoy.map(v => ({
          id: v.id,
          programada: new Date(v.programadaTs).toLocaleString(),
          status: v.status
        }))
      );

      if (view === VIEWS.DASH) {
        renderDashboard();
      }
    },
    (err) => {
      console.error("REALTIME ERROR:", err);
      toast("Realtime", "No se pudo escuchar cambios del día.", "bad", 4200);
    }
  );
}

function stopListenerHoy(){
    if(unsubscribeHoy){
      try{ unsubscribeHoy(); }catch{}
      unsubscribeHoy = null;
    }
  }

  // ---------- INIT: Auth observer ----------
  const waitFB = setInterval(() => {
    if(window.__FB__?.onAuthStateChanged){
      clearInterval(waitFB);
      const { auth, onAuthStateChanged, signOut } = window.__FB__;

      onAuthStateChanged(auth, async (user) => {
        currentUser = user || null;

        if(!currentUser){
          userProfile = null;
          userRole = null;
          stopScanner();
          stopListenerHoy();
          paintUser();
          return goTo(VIEWS.LOGIN);
        }

        try{
          userProfile = await loadUserProfile(currentUser.uid);
          if(!userProfile){
            toast("Acceso bloqueado","Tu cuenta no tiene rol asignado en /users.", "bad", 5200);
            await signOut(auth);
            return;
          }
          if(userProfile.activo === false){
            toast("Acceso bloqueado","Tu cuenta está desactivada.", "bad", 5200);
            await signOut(auth);
            return;
          }

          userRole = String(userProfile.rol || "").toLowerCase();
          if(userRole !== ROLES.ADMIN && userRole !== ROLES.GUARDIA && userRole !== ROLES.ANFITRION){
            toast("Acceso bloqueado","Rol inválido en /users.", "bad", 5200);
            await signOut(auth);
            return;
          }

          paintUser();
          toast("Sesión activa", "Bienvenido(a).", "ok", 1600);
          startListenerHoy();
          return goTo(VIEWS.DASH);

        }catch(e){
          console.error(e);
          toast("Error", "No se pudo validar tu perfil en /users.", "bad", 5200);
          await signOut(auth);
        }
      });
    }
  }, 50);

})();
</script>
