  <script>
        function waitForFirebase(){
      return new Promise((resolve, reject) => {
        const started = Date.now();
        const timer = setInterval(() => {
          if(window.DB?.db && window.DB?.auth){
            clearInterval(timer);
            resolve(window.DB);
            return;
          }
          if(Date.now() - started > 8000){
            clearInterval(timer);
            reject(new Error("Firebase no terminó de cargar"));
          }
        }, 50);
      });
    }

    async function ensureKioskSession(){
      const DB = await waitForFirebase();
      if(DB.auth.currentUser?.isAnonymous) return DB.auth.currentUser;
      const cred = await DB.signInAnonymously(DB.auth);
      return cred.user;
    }

    function todayISO(ts){
      const d = new Date(ts);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function timeHM(ts){
      const d = new Date(ts);
      return `${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
    }

    async function registrar(){
      const btn = document.getElementById("btnRegistrar");
      if(btn) btn.disabled = true;

      const nombre = document.getElementById("nombre").value.trim();
      const empresa = document.getElementById("cEmpresa").value.trim();
      const motivo = document.getElementById("cMotivo").value;
      const persona = document.getElementById("cPersona").value;

      if(!nombre || !empresa || !motivo || !persona){
        if(btn) btn.disabled = false;
        return alert("Completa todos los campos");
      }

      const now = Date.now();
      const suffix = crypto?.randomUUID ? crypto.randomUUID().slice(0, 8) : Math.floor(Math.random() * 1000000);
      const id = `VIS-${now}-${suffix}`;

      const data = {
        id,
        tipo: "visitante",
        origen: "kiosk",
        nombreVisitante: nombre,
        empresa,
        motivoVisita: motivo,
        personaVisita: persona,

        // ✅ NUEVO: desde kiosko queda pendiente
        status: "autorizacion",

        qrActivo: true,
        // no ponemos llegadaTs todavía, porque NO ha sido autorizado
        llegadaTs: null,
        createdTs: now,
        updatedTs: now,
        fechaProgramada: todayISO(now),
        horaProgramada: timeHM(now),
        programadaTs: now,
        autorizadoTs: null,
        autorizadoPor: "",
        serverTs: window.DB.serverTimestamp()
      };

      try{
        await ensureKioskSession();
        await window.DB.setDoc(window.DB.doc(window.DB.db, "visitas", id), data);
        renderResultado(data);
      }catch(e){
        console.error(e);
        const code = e?.code || "";
        const msg = code === "permission-denied"
          ? "No se pudo registrar: Firestore no permite este registro desde kiosko. Revisa reglas o habilita Auth anónimo."
          : code === "auth/admin-restricted-operation"
            ? "No se pudo registrar: habilita el inicio de sesión anónimo en Firebase Authentication."
            : "No se pudo registrar. Revisa conexión.";
        alert(msg);
        if(btn) btn.disabled = false;
      }
    }

    function visitorPassMarkup(data){
      const inicial = String(data.nombreVisitante || "V").trim().charAt(0).toUpperCase() || "V";
      return `
        <div class="visitor-pass-wrap"><div class="visitor-pass" id="visitorPass">
          <div class="visitor-pass-hero"><div><div class="visitor-pass-brand"><img src="icons/icon-192.png" alt="MereSoft Access Control" data-html2canvas-ignore="true"><div><strong>MereSoft</strong><span>Access Control</span></div></div><div class="visitor-pass-title"><h2>Cita visitante</h2></div></div><div class="visitor-pass-number"><small>Folio</small><b>${escapeHtml(data.id)}</b><i></i></div></div>
          <div class="visitor-pass-body"><div class="visitor-pass-person"><div class="visitor-pass-avatar">${escapeHtml(inicial)}</div><div><div class="visitor-pass-label">Visitante</div><div class="visitor-pass-name">${escapeHtml(data.nombreVisitante)}</div><div class="visitor-pass-sub">${escapeHtml(data.empresa)}</div></div></div>
            <div class="visitor-pass-facts"><div class="visitor-pass-fact"><div class="visitor-pass-icon">A</div><div><div class="visitor-pass-label">Visita a</div><b>${escapeHtml(data.personaVisita)}</b><span>${escapeHtml(data.motivoVisita)}</span></div></div><div class="visitor-pass-fact"><div class="visitor-pass-icon">H</div><div><div class="visitor-pass-label">Fecha y hora</div><b>${escapeHtml(data.fechaProgramada)}</b><span>${escapeHtml(data.horaProgramada)}</span></div></div></div>
            <div class="visitor-pass-qr-zone"><div class="visitor-pass-side"><div class="visitor-pass-icon">ID</div><i></i><div>Identificacion</div></div><div class="visitor-pass-qr-card"><div id="qr" class="visitor-pass-qr"></div><div class="visitor-pass-code">${escapeHtml(data.id)}<small>Codigo QR</small></div></div><div class="visitor-pass-side"><div class="visitor-pass-icon">15</div><i></i><div>Valido<br>15 min</div></div></div>
            <div class="visitor-pass-instructions"><div class="visitor-pass-icon">!</div><div><b>Indicaciones</b><p>Conserva este pase. Guardia podra escanearlo cuando tu entrada sea autorizada.</p></div></div></div>
          <div class="visitor-pass-footer">MereSoft Suite - Visitantes</div>
        </div></div>`;
    }

    async function visitorPassBlob(){
      const pass = document.getElementById("visitorPass");
      if(pass && window.html2canvas){
        const rendered = await window.html2canvas(pass, {
          backgroundColor: "#f8fafc",
          scale: Math.min(2, window.devicePixelRatio || 1.5),
          useCORS: false,
          allowTaint: false,
          ignoreElements: (el) => el?.hasAttribute?.("data-html2canvas-ignore")
        });
        const blob = await new Promise(resolve => rendered.toBlob(resolve, "image/png", 0.95));
        if(blob) return blob;
        const dataUrl = rendered.toDataURL("image/png");
        return await (await fetch(dataUrl)).blob();
      }
      return null;
    }

    function renderResultado(data){
      document.getElementById("formCard").style.display = "none";
      document.getElementById("resultado").innerHTML = `${visitorPassMarkup(data)}<div class="row" style="margin-top:12px;"><button class="secondary" id="btnGuardarQR" type="button">Guardar pase</button><button class="secondary" id="btnCompartirQR" type="button">Compartir pase</button></div>`;
      const qrEl = document.getElementById("qr");
      qrEl.innerHTML = "";
      new QRCode(qrEl, { text:data.id, width:190, height:190 });
      const canvas = qrEl.querySelector("canvas");
      const qrDataUrl = canvas?.toDataURL("image/png");
      document.getElementById("btnGuardarQR").onclick = async () => {
        const blob = await visitorPassBlob();
        if(!blob) return alert("No se pudo generar el pase");
        const passDataUrl = await new Promise(resolve => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.readAsDataURL(blob);
        });
        const a = document.createElement("a");
        a.href = passDataUrl;
        a.download = `Pase-Visitante-${data.id}.png`;
        a.click();
      };
      document.getElementById("btnCompartirQR").onclick = async () => {
        if(!navigator.share){ alert("Tu dispositivo no soporta compartir. Usa Guardar pase."); return; }
        const passBlob = await visitorPassBlob();
        if(!passBlob){ await navigator.share({ title:"Pase de Visitante", text:"Conserva este pase para tu visita" }); return; }
        try{
          const file = new File([passBlob], `Pase-Visitante-${data.id}.png`, {type:"image/png"});
          await navigator.share({ title:"Pase de Visitante", text:"Conserva este pase para tu visita", files:[file] });
        }catch(e){ console.error(e); alert("No se pudo compartir el pase"); }
      };
    }
    function escapeHtml(s){
      return String(s ?? "").replace(/[&<>"']/g, (ch) => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[ch]));
    }
  </script>

        navigator.serviceWorker
          .register("./service-worker.js")
          .then(() => console.log("âœ… Service Worker registrado"))
          .catch(err => console.error("âŒ SW error", err));
      });
    }
  </script>
